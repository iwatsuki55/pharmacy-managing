/* ─── NSIPS CSV ───────────────────────── */
function toD(s){return(s||"").replace(/-/g,"");}
function now8(){const d=new Date();return`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;}
function nowF(){const d=new Date();return`${now8()}${String(d.getHours()).padStart(2,"0")}${String(d.getMinutes()).padStart(2,"0")}${String(d.getSeconds()).padStart(2,"0")}`;}
function esc(s){return`"${(s||"").replace(/"/g,'""')}"`;};

function buildCSV(pts){
  const lines=[];
  const rno=String(Math.floor(Math.random()*9000)+1000).padStart(6,"0");
  lines.push(["H","NSIPS","1.06",nowF(),"PHARMACY001",rno].join(","));
  let cnt=1;
  pts.forEach(p=>{
    const q=p.q||{},g=p.guid||{};
    const gc=p.gender==="男性"?"1":p.gender==="女性"?"2":"3";
    lines.push(["P",p.no,esc(p.name),esc(p.kana||""),toD(p.bday),gc,esc(p.allergy!=="なし"?p.allergy:"")].join(","));cnt++;
    if(q.done){lines.push(["Q",p.no,now8(),esc(p.symptoms||""),esc(p.meds||""),esc(q.alc||""),esc(q.smk||""),esc(q.prg||""),esc(q.se||"")].join(","));cnt++;}
    if(g.note||g.ms){
      const sl=Object.entries(g.ses||{}).filter(([,v])=>v).map(([k])=>k).join("／");
      lines.push(["I",p.no,now8(),esc(g.ms||""),esc(sl),esc(g.note||""),toD(g.nf||"")].join(","));cnt++;
    }
  });
  lines.push(["E",cnt+1].join(","));
  return lines.join("\r\n");
}

function dlCSV(content,filename){
  const blob=new Blob(["\uFEFF"+content],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
}

    /* 再診 Step1: お薬・アレルギー */

      <div style={{fontSize:15,fontWeight:600,color:C.text,marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
        <span style={{width:28,height:28,borderRadius:"50%",background:C.tealL,display:"inline-flex",alignItems:"center",justifyContent:"center"}}>💊</span>

        <div style={{display:"flex",gap:8}}>{["なし","使用中あり"].map(v=>(

    /* 再診 Step2: 症状・生活習慣 */
    <div key="r2">

        <span style={{width:28,height:28,borderRadius:"50%",background:C.tealL,display:"inline-flex",alignItems:"center",justifyContent:"center"}}>🩺</span>

      <div style={{marginBottom:14}}>
        <label style={S.label}>体調の変化（前回来局時と比べて）</label>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {["変化なし","よくなった","悪化した","新しい症状が出た"].map(v=>(
            <button key={v} style={S.radioBtn(rf.bodyChange===v)} onClick={()=>setR("bodyChange",v)}>{v}</button>

        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
        <div><label style={S.label}>飲酒</label>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{["なし","時々","毎日"].map(v=>(
            <button key={v} style={S.radioBtn(rf.alc===v)} onClick={()=>setR("alc",v)}>{v}</button>
          ))}</div>
        </div>
        <div><label style={S.label}>喫煙</label>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{["なし","過去あり","現在あり"].map(v=>(

          ))}</div>

      <div><label style={S.label}>妊娠の可能性</label>
        <div style={{display:"flex",gap:8}}>{["なし","あり","不明"].map(v=>(

    /* 再診 Step3: 副作用・服薬状況 */
    <div key="r3">

        <span style={{width:28,height:28,borderRadius:"50%",background:C.amberL,display:"inline-flex",alignItems:"center",justifyContent:"center"}}>⚠️</span>
        副作用・服薬状況
      </div>
      <div style={{marginBottom:14}}>
        <label style={S.label}>前回のお薬で気になる症状はありましたか？</label>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          {["なし","あった"].map(v=>(
            <button key={v} style={S.radioBtn(rf.se===v)} onClick={()=>setR("se",v)}>{v}</button>
          ))}
        </div>
        {rf.se==="あった"&&(
          <textarea style={{...S.textarea,minHeight:60}} value={rf.seD}
            onChange={e=>setR("seD",e.target.value)} placeholder="例：発疹が出た、胃がむかむかした"/>
        )}
      </div>
      <div style={{marginBottom:14}}>
        <label style={S.label}>お薬はきちんと飲めていますか？</label>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {["きちんと飲めている","時々忘れた","よく忘れた","自分で止めた"].map(v=>(
            <button key={v} style={S.radioBtn(rf.adhere===v)} onClick={()=>setR("adhere",v)}>{v}</button>
          ))}
        </div>
      </div>
      <div style={{background:C.tealL,border:`1px solid ${C.tealB}`,borderRadius:9,
        padding:"12px 15px",fontSize:13,color:C.tealM,lineHeight:1.7,marginTop:8}}>
        入力内容は薬剤師のみ確認します。ご不明な点はスタッフにお声がけください。
      </div>
    </div>,
  ];

  const isFirst=visitType==="first";
  const steps=isFirst?firstSteps:returnSteps;
  const labels=isFirst?FIRST_LABELS:RETURN_LABELS;
  const lastStep=steps.length-1;

  const buildSubmitData=()=>{
    if(isFirst) return {
      name:ff.name, kana:ff.kana, age:ff.age, gender:ff.gender, bday:ff.bday,
      tel:ff.tel, address:ff.address,
      allergy:ff.allergy==="あり"?(ff.allergyDetail||"アレルギーあり"):"なし",
      meds:ff.otherMeds==="あり"?(ff.otherMedsDetail||"服用中あり"):"なし",
      otc:ff.otherMeds,
      symptoms:`副作用歴:${ff.sideEffect}${ff.sideEffect==="あり"?" ("+ff.sideEffectDrug+"/"+ff.sideEffectSymptom+")":" "}　既往歴:${ff.pastHistory}${ff.pastHistory==="あり"?"("+ff.pastHistoryDetail+")":""}`,
      alc:ff.alc, smk:ff.smk, prg:ff.prg,
      se:ff.sideEffect, done:true, visitType:"first",
      generic:ff.generic, mynaConsent:ff.mynaConsent,
      okusuri:ff.okusuri, forget:ff.forget, ippo:ff.ippo,
    };
    return {
      name:rf.name, age:rf.age, gender:rf.gender,
      allergy:rf.allergy||"変更なし", meds:rf.meds||"変更なし", otc:rf.otc,
      symptoms:rf.symptoms, alc:rf.alc, smk:rf.smk, prg:rf.prg,
      se:rf.se, seD:rf.seD, adhere:rf.adhere, bodyChange:rf.bodyChange,
      done:true, visitType:"return",
    };
  };

  return(
    <div>
      {/* 問診票モード表示 */}
    <div style={{background:C.white,borderBottom:`1px solid ${C.border}`,padding:'8px 20px',display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:12,color:C.mid}}>問診票モード：</span><span style={{fontSize:12,fontWeight:700,color:visitType==="first"?C.teal:C.amber,background:visitType==="first"?C.tealL:C.amberL,padding:'2px 10px',borderRadius:20}}>{visitType==="first"?"初診用":"再診用"}</span></div>
      <div style={{maxWidth:620,margin:"0 auto",padding:"20px 16px"}}>
        {/* プログレスバー */}
        <div style={{display:"flex",gap:6,marginBottom:18}}>
          {labels.map((s,i)=>(
            <div key={i} style={{flex:1,textAlign:"center"}}>
              <div style={{height:4,borderRadius:2,
                background:i<step?(isFirst?C.teal:C.amber):i===step?(isFirst?C.teal:C.amber):C.border,
                marginBottom:4,transition:"background .3s"}}/>
              <span style={{fontSize:10,
                color:i===step?(isFirst?C.teal:C.amber):C.light,
                fontWeight:i===step?700:400}}>{s}</span>
            </div>
          ))}
        </div>

        <div style={{...S.card,padding:"22px 24px"}}>
          {steps[step]}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
            marginTop:20,paddingTop:16,borderTop:`1px solid ${C.border}`}}>
            <button style={S.btnOutline} onClick={()=>setStep(s=>Math.max(0,s-1))} disabled={step===0}>← 戻る</button>
            <span style={{fontSize:12,color:C.light}}>{step+1} / {labels.length}</span>
            {step<lastStep
              ?<button style={{...S.btnPrimary,background:isFirst?C.teal:C.amber}}
                  onClick={()=>setStep(s=>s+1)}>次へ →</button>
              :<button style={{...S.btnPrimary,background:isFirst?C.teal:C.amber}}
                  onClick={()=>onSubmit(buildSubmitData())}>✓ 送信する</button>
            }
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── OCR 問診モード ──────────────────────── */
function OcrMode({onComplete,onBack}){
  const [phase,setPhase]=useState("capture"); // capture | reviewing | done
  const [imgData,setImgData]=useState(null);
  const [imgFile,setImgFile]=useState(null);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const [parsed,setParsed]=useState({
    name:"",age:"",gender:"",allergy:"",meds:"",otc:"",
    symptoms:"",alc:"",smk:"",prg:"",se:"",seD:""
  });
  const [confidence,setConfidence]=useState({});
  const fileRef=React.useRef();

  const FIELDS=[
    {key:"name",     label:"お名前",           type:"text",  placeholder:"山田 太郎"},
    {key:"age",      label:"年齢",             type:"number",placeholder:"65"},
    {key:"gender",   label:"性別",             type:"radio", options:["男性","女性","その他"]},
    {key:"allergy",  label:"アレルギー",        type:"text",  placeholder:"なし"},
    {key:"meds",     label:"服用中の薬",        type:"text",  placeholder:"なし"},
    {key:"otc",      label:"市販薬・サプリ",    type:"radio", options:["なし","使用中あり"]},
    {key:"symptoms", label:"主な症状・お悩み",  type:"textarea",placeholder:""},
    {key:"alc",      label:"飲酒",             type:"radio", options:["なし","時々","毎日"]},
    {key:"smk",      label:"喫煙",             type:"radio", options:["なし","過去あり","現在あり"]},
    {key:"prg",      label:"妊娠の可能性",     type:"radio", options:["なし","あり","不明"]},
    {key:"se",       label:"前回副作用",       type:"radio", options:["なし","あった"]},
    {key:"seD",      label:"副作用の内容",     type:"text",  placeholder:""},
  ];

  const onFileChange=async(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    setImgFile(file);
    const reader=new FileReader();
    reader.onload=ev=>setImgData(ev.target.result);
    reader.readAsDataURL(file);
  };

  const runOCR=async()=>{
    if(!imgData)return;
    setLoading(true);
    setErr("");
    try{
      const base64=imgData.split(",")[1];
      const mediaType=imgData.split(";")[0].split(":")[1];
      const prompt=`以下は日本の調剤薬局で使われる手書きの問診票の画像です。
画像から読み取れる情報を JSON 形式で返してください。
読み取れない項目は空文字("")にし、不確かな項目のキーを "lowConfidence" 配列に入れてください。

返すべきJSONのキーと内容：
- name: 患者氏名（漢字・ひらがな・カタカナ）
- age: 年齢（数字のみ）
- gender: 性別（"男性" / "女性" / "その他" のどれか）
- allergy: アレルギー（薬・食べ物。なければ"なし"）
- meds: 現在服用中の薬（なければ"なし"）
- otc: 市販薬・サプリ使用（"なし" / "使用中あり"）
- symptoms: 主な症状・お悩み
- alc: 飲酒（"なし" / "時々" / "毎日"）
- smk: 喫煙（"なし" / "過去あり" / "現在あり"）
- prg: 妊娠の可能性（"なし" / "あり" / "不明"）
- se: 前回の副作用（"なし" / "あった"）
- seD: 副作用の内容（seが"あった"場合のみ）
- lowConfidence: 読み取りが不確かな項目のキー名の配列

重要：JSONのみを返してください。説明文・マークダウン記法は不要です。`;

      const resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          messages:[{
            role:"user",
            content:[
              {type:"image",source:{type:"base64",media_type:mediaType,data:base64}},
              {type:"text",text:prompt}
            ]
          }]
        })
      });
      const data=await resp.json();
      const raw=data.content?.[0]?.text||"";
      const clean=raw.replace(/```json|```/g,"").trim();
      const result=JSON.parse(clean);
      const {lowConfidence=[],...fields}=result;
      const confMap={};
      lowConfidence.forEach(k=>{confMap[k]=true;});
      setParsed(prev=>({...prev,...fields}));
      setConfidence(confMap);
      setPhase("reviewing");
    }catch(e){
      setErr("読み取りに失敗しました。画像を確認して再試行してください。\n詳細: "+e.message);
    }
    setLoading(false);
  };

  const set=(k,v)=>setParsed(p=>({...p,[k]:v}));

  const allRequired=parsed.name&&parsed.age&&parsed.gender;

  /* ── フェーズ: 撮影 ── */
  if(phase==="capture") return(
    <div style={{maxWidth:560,margin:"0 auto",padding:"24px 16px"}}>
      <div style={{...S.card,padding:"24px 28px"}}>
        <div style={{fontSize:16,fontWeight:600,color:C.text,marginBottom:6,display:"flex",alignItems:"center",gap:8}}>
          <span style={{width:30,height:30,borderRadius:"50%",background:C.amberL,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:16}}>📷</span>
          手書き問診票 OCR 読み取り
        </div>
        <div style={{fontSize:13,color:C.mid,marginBottom:20,lineHeight:1.7}}>
          手書きの問診票を撮影してください。AI が内容を読み取り、確認画面に自動入力します。
        </div>

        {/* アップロードエリア */}
        <div
          onClick={()=>fileRef.current.click()}
          style={{border:`2px dashed ${imgData?C.teal:C.border}`,borderRadius:12,padding:"32px 20px",
            textAlign:"center",cursor:"pointer",background:imgData?C.tealL:"#FAFCFC",
            transition:"all .2s",marginBottom:16}}>
          {imgData?(
            <div>
              <img src={imgData} alt="問診票" style={{maxWidth:"100%",maxHeight:300,borderRadius:8,marginBottom:12}}/>
              <div style={{fontSize:13,color:C.tealM,fontWeight:600}}>画像を選択済み — タップで変更</div>
            </div>
          ):(
            <div>
              <div style={{fontSize:40,marginBottom:12}}>📄</div>
              <div style={{fontSize:14,fontWeight:600,color:C.mid,marginBottom:6}}>ここをタップして画像を選択</div>
              <div style={{fontSize:12,color:C.light}}>カメラ撮影 または ファイル選択</div>
            </div>
          )}
        </div>
        <input ref={fileRef} type="file" accept="image/*" capture="environment"
          style={{display:"none"}} onChange={onFileChange}/>

        {/* 注意書き */}
        <div style={{background:C.amberL,border:`1px solid ${C.amberB}`,borderRadius:9,
          padding:"11px 14px",fontSize:12,color:"#633806",lineHeight:1.7,marginBottom:16}}>
          ⚠ AI の読み取り結果は必ず薬剤師が確認・修正してください。<br/>
          アレルギーや薬剤名は特に注意が必要です。
        </div>

        {err&&<div style={{background:C.dangerL,border:`1px solid ${C.dangerB}`,borderRadius:9,
          padding:"10px 14px",fontSize:13,color:"#A32D2D",marginBottom:14,whiteSpace:"pre-wrap"}}>{err}</div>}

        <div style={{display:"flex",justifyContent:"space-between"}}>
          <button style={S.btnOutline} onClick={onBack}>← 戻る</button>
          <button style={{...S.btnPrimary,opacity:(!imgData||loading)?0.4:1}}
            onClick={runOCR} disabled={!imgData||loading}>
            {loading?"読み取り中…":"AI で読み取る →"}
          </button>
        </div>
      </div>
    </div>
  );

  /* ── フェーズ: 確認・修正 ── */
  if(phase==="reviewing") return(
    <div style={{maxWidth:680,margin:"0 auto",padding:"24px 16px"}}>
      {/* 確認バナー */}
      <div style={{background:C.amberL,border:`1px solid ${C.amberB}`,borderRadius:10,
        padding:"12px 18px",marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:18}}>⚠️</span>
        <div>
          <div style={{fontSize:13,fontWeight:600,color:"#633806"}}>AI 読み取り結果を必ず確認・修正してください</div>
          <div style={{fontSize:12,color:"#854F0B",marginTop:2}}>
            {Object.keys(confidence).length>0
              ?`自信度が低い項目（黄色ハイライト）：${Object.keys(confidence).join("、")} — 特に注意して確認を`
              :"すべての項目が読み取れました。内容を確認してください。"
            }
          </div>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"200px 1fr",gap:16,marginBottom:16}}>
        {/* 原本サムネイル */}
        <div style={{...S.card,padding:"12px"}}>
          <div style={{fontSize:11,color:C.light,marginBottom:8,fontWeight:600}}>撮影画像（原本）</div>
          <img src={imgData} alt="原本" style={{width:"100%",borderRadius:8}}/>
          <button style={{...S.btnGray,width:"100%",marginTop:10,fontSize:12,padding:"7px"}}
            onClick={()=>{setPhase("capture");setImgData(null);setImgFile(null);}}>
            撮り直す
          </button>
        </div>

        {/* 確認・編集フォーム */}
        <div style={{...S.card,padding:"18px 20px"}}>
          <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:16,
            paddingBottom:10,borderBottom:`1px solid ${C.border}`}}>
            読み取り結果の確認・修正
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {FIELDS.map(({key,label,type,options,placeholder})=>{
              const isLow=!!confidence[key];
              const boxStyle={background:isLow?"#FFFBF0":C.white,
                border:`1.5px solid ${isLow?C.amberB:C.border}`,
                borderRadius:9,padding:"8px 10px"};
              return(
                <div key={key} style={{background:isLow?"#FFFBF0":"transparent",
                  borderRadius:9,padding:isLow?"8px 10px":"0 2px",
                  border:isLow?`1px solid ${C.amberB}`:"none"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                    <label style={{...S.label,margin:0}}>{label}</label>
                    {isLow&&<span style={{fontSize:10,background:C.amberL,color:C.amber,
                      padding:"1px 6px",borderRadius:8,fontWeight:600}}>要確認</span>}
                  </div>
                  {type==="radio"?(
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      {options.map(o=>(
                        <button key={o} style={S.radioBtn(parsed[key]===o)} onClick={()=>set(key,o)}>{o}</button>
                      ))}
                    </div>
                  ):type==="textarea"?(
                    <textarea style={{...S.textarea,minHeight:60,
                      border:`1.5px solid ${isLow?C.amberB:C.border}`,background:isLow?"#FFFBF0":"#FAFCFC"}}
                      value={parsed[key]} onChange={e=>set(key,e.target.value)} placeholder={placeholder}/>
                  ):(
                    <input style={{...S.input,
                      border:`1.5px solid ${isLow?C.amberB:C.border}`,background:isLow?"#FFFBF0":"#FAFCFC"}}
                      type={type} value={parsed[key]} onChange={e=>set(key,e.target.value)} placeholder={placeholder}/>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* フッター操作 */}
      <div style={{...S.card,padding:"14px 20px",display:"flex",
        justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:12,color:C.light}}>
          {allRequired
            ?<span style={{color:C.teal,fontWeight:600}}>✓ 必須項目入力済み</span>
            :<span style={{color:C.danger}}>氏名・年齢・性別は必須です</span>
          }
        </div>
        <div style={{display:"flex",gap:8}}>
          <button style={S.btnGray} onClick={()=>setPhase("capture")}>← 撮り直す</button>
          <button style={{...S.btnPrimary,opacity:allRequired?1:0.4}}
            disabled={!allRequired}
            onClick={()=>{onComplete({...parsed,done:true});setPhase("done");}}>
            確認完了・保存 →
          </button>
        </div>
      </div>
    </div>
  );

  /* ── フェーズ: 完了 ── */
  return(
    <div style={{maxWidth:500,margin:"60px auto",padding:"0 16px"}}>
      <div style={{...S.card,padding:"56px 32px",textAlign:"center"}}>
        <div style={{fontSize:52,marginBottom:16}}>✅</div>
        <div style={{fontSize:20,fontWeight:700,color:C.teal,marginBottom:10}}>問診票を取り込みました</div>
        <div style={{fontSize:14,color:C.mid,marginBottom:24,lineHeight:1.7}}>
          薬剤師ダッシュボードで内容を確認できます。
        </div>
        <button style={S.btnOutline} onClick={onBack}>ダッシュボードへ戻る</button>
      </div>
    </div>
  );
}

                    padding:"9px 12px",borderRadius:9,

                  <div style={{display:"flex",alignItems:"center",gap:8}}>

                      <div style={{width:16,height:16,borderRadius:3,

                        background:checked?C.teal:C.white,display:"flex",
                        alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        {checked&&<span style={{color:"#fff",fontSize:10,fontWeight:700}}>✓</span>}
                      </div>
                    )}
                    <span style={{fontSize:12,fontWeight:eligible?500:400,
                      color:eligible?C.text:C.light}}>{k.label}</span>
                  </div>
                  <span style={{fontSize:11,padding:"2px 8px",borderRadius:8,
                    background:eligible?C.white:"transparent",
                    border:eligible?`0.5px solid ${checked?C.tealB:C.border}`:"none",
                    color:eligible?checked?C.tealM:C.mid:C.light,fontWeight:eligible?600:400}}>
                    {eligible?`${k.point} · 算定可`:"対象外"}
                  </span>
                </div>
              );
            })}
          </div>
          {checkedCount>0&&(
            <div style={{background:C.amberL,border:`0.5px solid ${C.amberB}`,borderRadius:9,
              padding:"10px 12px",fontSize:12,color:"#633806",lineHeight:1.6}}>
              副作用が{checkedCount}件確認されています。次回フォロー時に経過を確認してください。
            </div>
          )}
        </div>
      </div>

      {/* フッター */}
      <div style={{background:C.white,borderTop:`1px solid ${C.border}`,padding:"12px 20px",
        display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:12,color:C.light}}>
          {saved
            ?<span style={{color:C.teal,fontWeight:600}}>✓ 保存しました</span>
            :<span>未保存 — 保存後に CSV出力が反映されます</span>}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button style={S.btnGray}
            onClick={()=>setG({tmpl:"",note:"",ses:{},ms:"",nf:"",kazan:{}})}>リセット</button>
          <button style={S.btnOutline} onClick={handleSave}>記録を保存</button>
          <button style={S.btnPrimary} onClick={handleSaveAndExport}>記録を保存 + NSIPS 出力</button>
        </div>
      </div>
    </div>
  );
}

/* ─── PINロック画面 ──────────────────────── */
function PinLock({onUnlock}){
  const [pin,setPin]=useState("");
  const [shake,setShake]=useState(false);
  const CORRECT="1234";
  const append=(d)=>{
    if(pin.length>=4)return;
    const next=pin+d;
    setPin(next);
    if(next.length===4){
      if(next===CORRECT){ onUnlock(); setPin(""); }
      else{
        setShake(true);
        setTimeout(()=>{ setShake(false); setPin(""); },600);
      }
    }
  };
  const del=()=>setPin(p=>p.slice(0,-1));
  const KEYS=["1","2","3","4","5","6","7","8","9","","0","⌫"];
  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{...S.card,padding:"36px 32px",width:320,textAlign:"center"}}>
        <div style={{fontSize:15,fontWeight:600,color:C.text,marginBottom:6}}>薬剤師モード</div>
        <div style={{fontSize:13,color:C.mid,marginBottom:24}}>PINを入力してください</div>
        {/* ドット表示 */}
        <div style={{display:"flex",justifyContent:"center",gap:14,marginBottom:28,
          animation:shake?"shake .5s":"none"}}
          onAnimationEnd={()=>setShake(false)}>
          {[0,1,2,3].map(i=>(
            <div key={i} style={{width:16,height:16,borderRadius:"50%",
              background:i<pin.length?C.teal:C.border,transition:"background .15s"}}/>
          ))}
        </div>
        {/* テンキー */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
          {KEYS.map((k,i)=>(
            k===""?<div key={i}/>:
            <button key={i} onClick={k==="⌫"?del:()=>append(k)}
              style={{height:56,borderRadius:12,border:`1px solid ${C.border}`,
                background:k==="⌫"?C.bg:C.white,
                fontSize:k==="⌫"?20:22,fontWeight:500,color:C.text,cursor:"pointer"}}>
              {k}
            </button>
          ))}
        </div>
        {pin.length>0&&shake&&(
          <div style={{marginTop:16,fontSize:13,color:C.danger,fontWeight:600}}>PINが違います</div>
        )}
        <div style={{marginTop:20,fontSize:11,color:C.light}}>初期PIN: 1234</div>
      </div>
      <style>{`@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}`}</style>
    </div>
  );
}

/* ─── 患者トップ画面 ─────────────────────── */

      <div style={{width:"100%",maxWidth:560}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:22,fontWeight:700,color:C.text,marginBottom:8}}>ようこそ</div>

/* ─── スタッフ呼び出し画面 ───────────────── */
function CallStaff(){

    <div style={{minHeight:"calc(100vh - 60px)",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"}}>
      <div style={{...S.card,padding:"56px 40px",textAlign:"center",maxWidth:440}}>
        <div style={{fontSize:64,marginBottom:20}}>🔔</div>
        <div style={{fontSize:20,fontWeight:700,color:C.text,marginBottom:12}}>

        </div>

          <span style={{fontSize:13,color:C.light}}>手書きの問診票をお持ちの方は<br/>スタッフにお渡しください。</span>
        </div>

/* ─── メインアプリ ─────────────────────── */
function App(){
  const [screen,setScreen]=useState("patientTop");
  const [visitType,setVisitType]=useState("first");
  // screen: patientTop | visitSelect | patientForm | callStaff | submitted | pinLock | pharmacist | guidance | ocr
  const [patients,setPatients]=useState(INIT_PATIENTS);
  const [selId,setSelId]=useState(null);
  const [guidanceTarget,setGuidanceTarget]=useState(null);
  const [checkedItems,setCheckedItems]=useState({});

  const goPatientTop=()=>setScreen("patientTop");
  const goPharmacist=()=>setScreen("pharmacist");

  const handleSaveGuidance=(id,g)=>{
    setPatients(prev=>prev.map(p=>p.id===id?{...p,guid:g}:p));
  };

  const pt=patients.find(p=>p.id===guidanceTarget);

  /* ── ヘッダ ── */
  const isPatientScreen=["patientTop","patientForm","callStaff","submitted"].includes(screen);
  const isPharmacistScreen=["pharmacist","guidance","ocr"].includes(screen);

  return(
    <div style={{fontFamily:"inherit",background:C.bg,minHeight:"100vh",color:C.text}}>
      {/* ヘッダ — PINロック中は非表示 */}
      {screen!=="pinLock"&&(
        <header style={{background:C.teal,height:60,display:"flex",alignItems:"center",
          justifyContent:"space-between",padding:"0 24px",boxShadow:"0 2px 8px rgba(0,0,0,.1)"}}>
          <div style={{fontSize:17,fontWeight:600,color:"#fff",letterSpacing:"0.03em"}}>
            {isPharmacistScreen?"ファーマシー 問診・投薬支援 — 薬剤師モード":"ファーマシー 問診・投薬支援"}
          </div>
          <div style={{display:"flex",gap:6}}>
            {/* 患者側：薬剤師モードへのロック付き切り替え */}
            {isPatientScreen&&(
              <button onClick={()=>setScreen("pinLock")}
                style={{padding:"6px 16px",borderRadius:20,fontSize:13,fontWeight:600,
                  border:"1.5px solid rgba(255,255,255,.4)",background:"transparent",color:"#fff",cursor:"pointer"}}>
                🔒 薬剤師モードへ
              </button>
            )}
            {/* 薬剤師側：サブナビ */}
            {isPharmacistScreen&&(
              <div style={{display:"flex",gap:6}}>
                {[["pharmacist","ダッシュボード"],["ocr","OCR問診"]].map(([s,l])=>(
                  <button key={s} onClick={()=>{setScreen(s);setGuidanceTarget(null);}}
                    style={{padding:"6px 16px",borderRadius:20,fontSize:13,fontWeight:600,border:"none",cursor:"pointer",
                      background:screen===s?"#fff":"rgba(255,255,255,.18)",
                      color:screen===s?C.teal:"#fff"}}>
                    {l}
                  </button>
                ))}
                <button onClick={goPatientTop}
                  style={{padding:"6px 16px",borderRadius:20,fontSize:13,fontWeight:600,
                    border:"1.5px solid rgba(255,255,255,.4)",background:"transparent",color:"#fff",cursor:"pointer"}}>
                  患者モードへ戻る
                </button>
              </div>
            )}
          </div>
        </header>
      )}

      {/* 本体 */}
      {screen==="patientTop"&&(
        <PatientTop
          onStartTablet={()=>setScreen("visitSelect")}
          onCallStaff={()=>setScreen("callStaff")}
        />
      )}
      {screen==="visitSelect"&&(
        <VisitTypeSelect
          onSelect={(vt)=>{setVisitType(vt);setScreen("patientForm");}}
          onBack={()=>setScreen("patientTop")}
        />
      )}
      {screen==="patientForm"&&(
        <PatientMode onSubmit={()=>setScreen("submitted")} visitType={visitType}/>
      )}
      {screen==="callStaff"&&<CallStaff/>}
      {screen==="submitted"&&(
        <div style={{maxWidth:500,margin:"60px auto",padding:"0 16px"}}>
          <div style={{...S.card,padding:"56px 32px",textAlign:"center"}}>
            <div style={{fontSize:52,marginBottom:16}}>✅</div>
            <div style={{fontSize:20,fontWeight:700,color:C.teal,marginBottom:10}}>問診票を送信しました</div>
            <div style={{fontSize:14,color:C.mid,marginBottom:24,lineHeight:1.7}}>
              ありがとうございました。<br/>タブレットをスタッフにお返しください。
            </div>
          </div>
        </div>
      )}
      {screen==="pinLock"&&(
        <PinLock onUnlock={()=>setScreen("pharmacist")}/>
      )}
      {screen==="pharmacist"&&(
        guidanceTarget&&pt?(
          <GuidanceRecord
            patient={pt}
            initGuid={pt.guid}
            onSave={(g)=>handleSaveGuidance(pt.id,g)}
            onBack={()=>setGuidanceTarget(null)}
          />
        ):(
          <PharmacistDashboard
            patients={patients}
            selId={selId}
            onSelect={setSelId}
            checkedItems={checkedItems}
            setCheckedItems={setCheckedItems}
            onSwitchToGuidance={(id)=>{setGuidanceTarget(id);}}
            onExportAll={()=>dlCSV(buildCSV(patients),`NSIPS_${now8()}_ALL.csv`)}
          />
        )
      )}
      {screen==="ocr"&&(
        <OcrMode
          onComplete={(q)=>{
            const newId=Date.now();
            const d=new Date();
            const dateStr=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
            setPatients(prev=>[...prev,{
              id:newId,
              no:`P${String(prev.length+1).padStart(3,"0")}`,
              name:q.name, kana:"", age:parseInt(q.age)||0,
              gender:q.gender, bday:"",
              allergy:q.allergy||"なし", meds:q.meds||"なし",
              symptoms:q.symptoms||"", visitCount:1, lastVisit:dateStr,
              q:{done:true,alc:q.alc||"",smk:q.smk||"",prg:q.prg||"",se:q.se||"",otc:q.otc||""},
              guid:null
            }]);
            setScreen("pharmacist");
            setSelId(newId);
          }}
          onBack={()=>setScreen("pharmacist")}
        />
      )}
      {screen==="guidance"&&pt&&(
        <GuidanceRecord
          patient={pt}
          initGuid={pt.guid}
          onSave={(g)=>handleSaveGuidance(pt.id,g)}
          onBack={()=>setScreen("pharmacist")}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
