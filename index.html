/* ─── NSIPS CSV ───────────────────────── */
function toD(s){return(s||"").replace(/-/g,"");}
function now8(){const d=new Date();return`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;}
function nowF(){const d=new Date();return`${now8()}${String(d.getHours()).padStart(2,"0")}${String(d.getMinutes()).padStart(2,"0")}${String(d.getSeconds()).padStart(2,"0")}`;}
function esc(s){return`"${(s||"").replace(/"/g,'""')}"`;};

function buildCSV(pts){
  const lines=[];
  const rno=String(Math.floor(Math.random()*9000)+1000).padStart(6,"0");
  lines.push(["H","NSIPS","1.06",nowF(),"PHARMACY001",rno].join(","));
  let cnt=1;
  pts.forEach(p=>{
    const q=p.q||{},g=p.guid||{};
    const gc=p.gender==="男性"?"1":p.gender==="女性"?"2":"3";
    lines.push(["P",p.no,esc(p.name),esc(p.kana||""),toD(p.bday),gc,esc(p.allergy!=="なし"?p.allergy:"")].join(","));cnt++;
    if(q.done){lines.push(["Q",p.no,now8(),esc(p.symptoms||""),esc(p.meds||""),esc(q.alc||""),esc(q.smk||""),esc(q.prg||""),esc(q.se||"")].join(","));cnt++;}
    if(g.note||g.ms){
      const sl=Object.entries(g.ses||{}).filter(([,v])=>v).map(([k])=>k).join("／");
      lines.push(["I",p.no,now8(),esc(g.ms||""),esc(sl),esc(g.note||""),toD(g.nf||"")].join(","));cnt++;
    }
  });
  lines.push(["E",cnt+1].join(","));
  return lines.join("\r\n");
}

function dlCSV(content,filename){
  const blob=new Blob(["\uFEFF"+content],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
}

/* ─── 薬剤師ダッシュボード ──────────────── */
function PharmacistDashboard({patients,selId,onSelect,onSwitchToGuidance,onExportAll}){
  const [search,setSearch]=useState("");
  const [checkedItems,setCheckedItems]=useState({});
  const toggleCheck=(patientId,idx)=>{
    const key=`${patientId}-${idx}`;
    setCheckedItems(prev=>({...prev,[key]:!prev[key]}));
  };
  const filtered=useMemo(()=>{
    if(!search.trim())return patients;
    const q=search.trim().toLowerCase();
    return patients.filter(p=>p.name.includes(q)||p.kana.toLowerCase().includes(q)||p.no.toLowerCase().includes(q));
  },[patients,search]);

  const pt=patients.find(p=>p.id===selId);

  return (
    <div style={{display:"grid",gridTemplateColumns:"240px 1fr",height:"calc(100vh - 60px)"}}>
      {/* サイドバー：患者リスト */}
      <div style={{borderRight:`1px solid ${C.border}`,background:C.white,display:"flex",flexDirection:"column"}}>
        <div style={{padding:"12px 12px 8px"}}>
          <input
            style={{...S.input,fontSize:13,padding:"8px 11px"}}
            placeholder="患者名・番号で検索..."
            value={search}
            onChange={e=>setSearch(e.target.value)}
          />
        </div>
        <div style={{padding:"4px 12px 6px"}}>
          <span style={{fontSize:11,color:C.light,fontWeight:600,letterSpacing:"0.05em"}}>
            本日来局 — {patients.length}名
          </span>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"0 8px 12px"}}>
          {filtered.map(p=>(
            <div
              key={p.id}
              onClick={()=>onSelect(p.id)}
              style={{padding:"10px 10px",borderRadius:10,marginBottom:4,cursor:"pointer",
                background:selId===p.id?C.tealL:"transparent",
                border:`1px solid ${selId===p.id?C.tealB:"transparent"}`,

                {label:"前回来局",val:pt.lastVisit?.slice(5)||"—",color:C.text},
                {label:"加算取得",val:"2件",color:C.teal},
                {label:"アレルギー",val:pt.allergy!=="なし"?"要注意":"なし",color:pt.allergy!=="なし"?C.amber:C.teal},
              ].map(({label,val,color})=>(
                <div key={label} style={{background:C.white,border:`0.5px solid ${C.border}`,borderRadius:10,padding:"11px 13px"}}>
                  <div style={{fontSize:11,color:C.light,marginBottom:4}}>{label}</div>
                  <div style={{fontSize:18,fontWeight:600,color}}>{val}</div>
                </div>
              ))}
            </div>

            {/* 問診内容（全項目） */}
            <div style={{...S.card,padding:"14px 18px",marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <span style={{fontSize:13,fontWeight:600,color:C.text}}>問診内容（全項目）</span>
                {!pt.q.done&&<span style={{fontSize:12,color:C.amber,fontWeight:600}}>⚠ 未記入</span>}
              </div>
              {!pt.q.done?(
                <div style={{background:C.amberL,border:`1px solid ${C.amberB}`,borderRadius:9,padding:"10px 13px",color:C.amber,fontSize:13}}>
                  まだ問診票が記入されていません。患者様にタブレットをお渡しください。
                </div>
              ):(
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                  {[
                    ["主訴",pt.symptoms],
                    ["アレルギー",pt.allergy],
                    ["服用中の薬",pt.meds],
                    ["飲酒",pt.q.alc],
                    ["喫煙",pt.q.smk],
                    ["妊娠の可能性",pt.q.prg],
                    ["前回副作用",pt.q.se],
                    ["市販薬",pt.q.otc||"—"],
                  ].map(([l,v])=>(
                    <div key={l} style={{background:C.bg,borderRadius:8,padding:"9px 11px"}}>
                      <div style={{fontSize:11,color:C.light,marginBottom:3}}>{l}</div>
                      <div style={{fontSize:13,fontWeight:600,color:l==="アレルギー"&&v!=="なし"?"#A32D2D":C.text}}>{v||"—"}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* 加算取得支援 */}
            <div style={{...S.card,padding:"14px 18px",marginBottom:12}}>
              <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:12}}>加算取得支援</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8}}>
                {KAZAN.map((k,i)=>{
                  const ok=i<2;
                  return(
                    <div key={k.key} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 12px",borderRadius:9,
                      background:ok?C.tealL:C.bg,border:`0.5px solid ${ok?C.tealB:C.border}`}}>
                      <span style={{fontSize:12,fontWeight:ok?600:400,color:ok?C.tealM:C.light}}>{k.label}</span>
                      <span style={{fontSize:11,padding:"2px 8px",borderRadius:8,background:ok?C.white:"transparent",
                        border:ok?`0.5px solid ${C.tealB}`:"none",color:ok?C.tealM:C.light,fontWeight:ok?600:400}}>
                        {ok?`${k.point} · 算定可`:"対象外"}
                      </span>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* 薬歴記載チェックリスト */}
            <div style={{...S.card,padding:"14px 18px",marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <span style={{fontSize:13,fontWeight:600,color:C.text}}>薬歴記載チェックリスト</span>
                <span style={{fontSize:11,color:C.light}}>
                  {CHECKLIST.filter((_,i)=>!!checkedItems[`${pt.id}-${i}`]).length} / {CHECKLIST.length} 完了
                </span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:7}}>
                {CHECKLIST.map((item,i)=>{
                  const checked=!!checkedItems[`${pt.id}-${i}`];
                  const isLast=i===CHECKLIST.length-1;
                  return(
                    <div key={item} onClick={()=>toggleCheck(pt.id,i)}
                      style={{display:"flex",alignItems:"center",gap:9,fontSize:13,cursor:"pointer",
                        color:checked?C.light:isLast&&!checked?C.danger:C.text,
                        padding:"5px 4px",borderRadius:7}}>
                      <div style={{width:18,height:18,borderRadius:4,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
                        background:checked?C.teal:"transparent",
                        border:`1.5px solid ${checked?C.teal:isLast&&!checked?C.danger:C.border}`,
                        transition:"all .15s"}}>
                        {checked&&<span style={{color:"#fff",fontSize:11,fontWeight:700}}>✓</span>}
                      </div>
                      <span style={{textDecoration:checked?"line-through":"none",
                        fontWeight:isLast&&!checked?600:400}}>{item}</span>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* 投薬指導へ遷移 */}
            <div style={{display:"flex",justifyContent:"flex-end"}}>
              <button style={{...S.btnPrimary,padding:"12px 28px",fontSize:14}} onClick={()=>onSwitchToGuidance(pt.id)}>
                投薬指導記録を開く →
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

/* ─── 投薬指導記録 ────────────────────── */
function GuidanceRecord({patient,initGuid,onSave,onBack}){
  const [g,setG]=useState(initGuid||{tmpl:"",note:"",ses:{},ms:"",nf:"",kazan:{}});
  const [saved,setSaved]=useState(false);
  const sg=(k,v)=>setG(x=>({...x,[k]:v}));
  const tse=(k)=>sg("ses",{...g.ses,[k]:!g.ses[k]});
  const tkz=(k)=>sg("kazan",{...g.kazan,[k]:!g.kazan[k]});

  const checkedCount=Object.values(g.ses).filter(Boolean).length;
  const seList=Object.entries(g.ses).filter(([,v])=>v).map(([k])=>k).join("／");

  const nsipsPreview=`I, ${patient.no}, ${now8()}, "${g.ms||""}", "${seList}", "${(g.note||"").slice(0,30)}${g.note?.length>30?"…":""}",  ${toD(g.nf)}`;

  const handleSave=()=>{
    onSave(g);
    setSaved(true);
    setTimeout(()=>setSaved(false),2500);
  };

  const handleSaveAndExport=()=>{
    onSave(g);
    const updatedPt={...patient,guid:g};
    dlCSV(buildCSV([updatedPt]),`NSIPS_${now8()}_${patient.no}.csv`);
    setSaved(true);
    setTimeout(()=>setSaved(false),2500);
  };

  return(
    <div style={{height:"calc(100vh - 60px)",display:"flex",flexDirection:"column",background:C.bg}}>
      {/* 患者バー */}
      <div style={{background:C.white,borderBottom:`1px solid ${C.border}`,padding:"10px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button style={{...S.btnGray,padding:"6px 14px",fontSize:12}} onClick={onBack}>← 戻る</button>
          <div>
            <span style={{fontWeight:600,fontSize:14,color:C.text}}>{patient.name}</span>
            <span style={{fontSize:12,color:C.mid,marginLeft:10}}>{patient.no} · {patient.age}歳 · {patient.gender}</span>
          </div>
          {patient.allergy!=="なし"&&(
            <div style={{background:C.dangerL,border:`1px solid ${C.dangerB}`,borderRadius:8,padding:"4px 10px",color:"#A32D2D",fontSize:12,fontWeight:600}}>
              ⚠ {patient.allergy}
            </div>
          )}
        </div>
        <span style={{fontSize:12,color:C.light}}>投薬指導記録</span>
      </div>

      {/* 2カラムボディ */}
      <div style={{flex:1,display:"grid",gridTemplateColumns:"1fr 1fr",overflow:"hidden"}}>
        {/* 左：指導内容 */}
        <div style={{overflowY:"auto",padding:"16px 18px",borderRight:`1px solid ${C.border}`}}>
          <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:12,paddingBottom:10,borderBottom:`1px solid ${C.border}`}}>
            指導内容
          </div>

          <label style={S.label}>テンプレートを選択</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
            {TEMPLATES.map(t=>(
              <button key={t.id} style={S.radioBtn(g.tmpl===t.id)} onClick={()=>{sg("tmpl",t.id);sg("note",t.text);}}>
                {t.label}
              </button>
            ))}
            <button style={S.radioBtn(g.tmpl==="custom")} onClick={()=>{sg("tmpl","custom");sg("note","");}}>
              + カスタム
            </button>
          </div>

          <label style={S.label}>指導メモ（編集可）</label>
          <textarea
            style={{...S.textarea,minHeight:100,marginBottom:14}}
            value={g.note}
            onChange={e=>sg("note",e.target.value)}
            placeholder="指導内容を入力、またはテンプレートを選択してください..."
            rows={5}
          />

          <label style={S.label}>服薬状況（アドヒアランス）</label>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
            {["良好","飲み忘れあり","自己中断あり","初回"].map(v=>(
              <button key={v} style={S.radioBtn(g.ms===v)} onClick={()=>sg("ms",v)}>{v}</button>
            ))}
          </div>

          <label style={S.label}>次回フォロー日</label>
          <input style={{...S.input,marginBottom:14}} type="date" value={g.nf} onChange={e=>sg("nf",e.target.value)}/>

          {/* NSIPSプレビュー */}
          <div style={{background:C.amberL,border:`0.5px solid ${C.amberB}`,borderRadius:9,padding:"10px 13px"}}>
            <div style={{fontSize:11,color:C.amber,fontWeight:600,marginBottom:5,letterSpacing:"0.04em"}}>NSIPS 出力プレビュー（I レコード）</div>
            <div style={{fontFamily:"monospace",fontSize:11,color:C.mid,wordBreak:"break-all",lineHeight:1.6}}>
              {nsipsPreview}
            </div>
          </div>
        </div>

        {/* 右：副作用・加算 */}
        <div style={{overflowY:"auto",padding:"16px 18px"}}>
          <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:12,paddingBottom:10,borderBottom:`1px solid ${C.border}`}}>
            副作用確認チェック
            {checkedCount>0&&<span style={{...S.badge("danger"),marginLeft:8}}>{checkedCount}件確認</span>}
          </div>

          <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:16}}>
            {SE_ITEMS.map(se=>{
              const on=!!g.ses[se];
              return(
                <div key={se} onClick={()=>tse(se)} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 11px",
                  borderRadius:9,border:`1px solid ${on?C.dangerB:C.border}`,
                  background:on?C.dangerL:C.white,cursor:"pointer",transition:"all .15s"}}>
                  <div style={{width:18,height:18,borderRadius:4,border:`1.5px solid ${on?C.danger:C.border}`,
                    background:on?C.danger:C.white,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    {on&&<span style={{color:"#fff",fontSize:11,fontWeight:700}}>✓</span>}
                  </div>
                  <span style={{fontSize:13,color:on?"#A32D2D":C.text,fontWeight:on?600:400}}>{se}</span>
                </div>
              );
            })}
          </div>

          <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:10,paddingBottom:8,borderBottom:`1px solid ${C.border}`}}>
            加算取得確認
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
            {KAZAN.map((k,i)=>{
              const eligible=i<2;
              const checked=!!g.kazan[k.key];
              return(
                <div key={k.key} onClick={()=>eligible&&tkz(k.key)}
                  style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 12px",
                  borderRadius:9,background:checked?C.tealL:eligible?C.white:C.bg,
                  border:`0.5px solid ${checked?C.tealB:eligible?C.border:C.border}`,
                  cursor:eligible?"pointer":"default",opacity:eligible?1:.6}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    {eligible&&(
                      <div style={{width:16,height:16,borderRadius:3,border:`1.5px solid ${checked?C.teal:C.border}`,
                        background:checked?C.teal:C.white,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        {checked&&<span style={{color:"#fff",fontSize:10,fontWeight:700}}>✓</span>}
                      </div>
                    )}
                    <span style={{fontSize:12,fontWeight:eligible?500:400,color:eligible?C.text:C.light}}>{k.label}</span>
                  </div>
                  <span style={{fontSize:11,padding:"2px 8px",borderRadius:8,
                    background:eligible?C.white:"transparent",
                    border:eligible?`0.5px solid ${checked?C.tealB:C.border}`:"none",
                    color:eligible?checked?C.tealM:C.mid:C.light,fontWeight:eligible?600:400}}>
                    {eligible?`${k.point} · 算定可`:"対象外"}
                  </span>
                </div>
              );
            })}
          </div>

          {/* 副作用フラグがある場合の注意 */}
          {checkedCount>0&&(
            <div style={{background:C.amberL,border:`0.5px solid ${C.amberB}`,borderRadius:9,padding:"10px 12px",fontSize:12,color:"#633806",lineHeight:1.6}}>
              副作用が{checkedCount}件確認されています。次回フォロー時に経過を確認してください。
            </div>
          )}
        </div>
      </div>

      {/* フッター */}
      <div style={{background:C.white,borderTop:`1px solid ${C.border}`,padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:12,color:C.light}}>
          {saved
            ?<span style={{color:C.teal,fontWeight:600}}>✓ 保存しました</span>
            :<span>未保存 — 保存後に CSV出力が反映されます</span>
          }
        </div>
        <div style={{display:"flex",gap:8}}>
          <button style={S.btnGray} onClick={()=>setG({tmpl:"",note:"",ses:{},ms:"",nf:"",kazan:{}})}>リセット</button>
          <button style={S.btnOutline} onClick={handleSave}>記録を保存</button>
          <button style={S.btnPrimary} onClick={handleSaveAndExport}>記録を保存 + NSIPS 出力</button>
        </div>
      </div>
    </div>
  );
}

/* ─── メインアプリ ─────────────────────── */
function App(){
  const [mode,setMode]=useState("patient"); // "patient" | "pharmacist" | "guidance"
  const [submitted,setSubmitted]=useState(false);
  const [patients,setPatients]=useState(INIT_PATIENTS);
  const [selId,setSelId]=useState(null);
  const [guidanceTarget,setGuidanceTarget]=useState(null);

  const handleSaveGuidance=(id,g)=>{
    setPatients(prev=>prev.map(p=>p.id===id?{...p,guid:g}:p));
  };

  const pt=patients.find(p=>p.id===guidanceTarget);

  return(
    <div style={{fontFamily:"inherit",background:C.bg,minHeight:"100vh",color:C.text}}>
      {/* ヘッダ */}
      <header style={{background:C.teal,height:60,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 24px",boxShadow:`0 2px 8px rgba(0,0,0,.1)`}}>
        <div style={{fontSize:17,fontWeight:600,color:"#fff",letterSpacing:"0.03em"}}>
          ファーマシー 問診・投薬支援
        </div>
        <div style={{display:"flex",gap:6}}>
          {[["patient","患者モード"],["pharmacist","薬剤師モード"]].map(([m,l])=>(
            <button key={m} onClick={()=>{setMode(m);setSubmitted(false);setGuidanceTarget(null);}}
              style={{padding:"6px 16px",borderRadius:20,fontSize:13,fontWeight:600,border:"none",cursor:"pointer",
                background:mode===m&&m!=="guidance"?"#fff":"rgba(255,255,255,.18)",
                color:mode===m&&m!=="guidance"?C.teal:"#fff"}}>
              {l}
            </button>
          ))}
        </div>
      </header>

      {/* 本体 */}
      {mode==="patient"?(
        submitted?(
          <div style={{maxWidth:500,margin:"60px auto",padding:"0 16px"}}>
            <div style={{...S.card,padding:"56px 32px",textAlign:"center"}}>
              <div style={{fontSize:52,marginBottom:16}}>✅</div>
              <div style={{fontSize:20,fontWeight:700,color:C.teal,marginBottom:10}}>問診票を送信しました</div>
              <div style={{fontSize:14,color:C.mid,marginBottom:24,lineHeight:1.7}}>
                しばらくお待ちください。<br/>薬剤師がご案内します。
              </div>
              <button style={S.btnOutline} onClick={()=>setSubmitted(false)}>最初に戻る</button>
            </div>
          </div>
        ):<PatientMode onSubmit={()=>setSubmitted(true)}/>
      ):mode==="pharmacist"?(
        guidanceTarget&&pt?(
          <GuidanceRecord
            patient={pt}
            initGuid={pt.guid}
            onSave={(g)=>handleSaveGuidance(pt.id,g)}
            onBack={()=>setGuidanceTarget(null)}
          />
        ):(
          <PharmacistDashboard
            patients={patients}
            selId={selId}
            onSelect={setSelId}
            onSwitchToGuidance={(id)=>{setGuidanceTarget(id);}}
            onExportAll={()=>dlCSV(buildCSV(patients),`NSIPS_${now8()}_ALL.csv`)}
          />
        )
      ):null}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
